<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Film frame border -->
  <rect x="60" y="40" width="680" height="370" fill="none" stroke="#B87A7A" stroke-width="1.5" opacity="0.4" rx="4"/>
  <rect x="70" y="50" width="660" height="350" fill="none" stroke="#B87A7A" stroke-width="0.8" opacity="0.2" rx="2"/>
  <!-- Sprocket holes -->
  <g fill="#B87A7A" opacity="0.3">
    <rect x="90" y="55" width="8" height="12" rx="2"/><rect x="120" y="55" width="8" height="12" rx="2"/><rect x="150" y="55" width="8" height="12" rx="2"/>
    <rect x="90" y="413" width="8" height="12" rx="2"/><rect x="120" y="413" width="8" height="12" rx="2"/><rect x="150" y="413" width="8" height="12" rx="2"/>
    <rect x="702" y="55" width="8" height="12" rx="2"/><rect x="672" y="55" width="8" height="12" rx="2"/><rect x="642" y="55" width="8" height="12" rx="2"/>
    <rect x="702" y="413" width="8" height="12" rx="2"/><rect x="672" y="413" width="8" height="12" rx="2"/><rect x="642" y="413" width="8" height="12" rx="2"/>
  </g>
  <!-- Play button -->
  <polygon points="370,190 370,260 440,225" fill="#C97B5B" opacity="0.8"/>
  <!-- Text -->
  <text x="400" y="310" text-anchor="middle" fill="#EDE0D0" font-family="Georgia,serif" font-size="26" letter-spacing="4" opacity="0.85">AUDIOVISUAL</text>
  <text x="400" y="340" text-anchor="middle" fill="#C97B5B" font-family="Georgia,serif" font-size="13" letter-spacing="3" opacity="0.7">ESSAY</text>
  <!-- Waveform hint -->
  <g fill="none" stroke="#BE9D6A" stroke-width="0.8" opacity="0.25">
    <path d="M 220,175 Q 240,155 260,175 T 300,175 T 340,175 T 380,175"/>
    <path d="M 420,175 Q 440,150 460,175 T 500,175 T 540,175 T 580,175"/>
  </g>
</svg>
