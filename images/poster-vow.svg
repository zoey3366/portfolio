<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C1F21"/>
      <stop offset="40%" style="stop-color:#3D2C2E"/>
      <stop offset="100%" style="stop-color:#4A2A2A"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Decorative rings -->
  <circle cx="400" cy="225" r="120" fill="none" stroke="#C97B5B" stroke-width="1.5" opacity="0.3"/>
  <circle cx="400" cy="225" r="140" fill="none" stroke="#B87A7A" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="225" r="160" fill="none" stroke="#BE9D6A" stroke-width="0.8" opacity="0.15"/>
  <!-- Center icon: intertwined rings representing vow/promise -->
  <ellipse cx="380" cy="210" rx="35" ry="50" fill="none" stroke="#C97B5B" stroke-width="2.5" opacity="0.8"/>
  <ellipse cx="420" cy="210" rx="35" ry="50" fill="none" stroke="#BE9D6A" stroke-width="2.5" opacity="0.8"/>
  <ellipse cx="380" cy="210" rx="35" ry="50" fill="none" stroke="#C97B5B" stroke-width="2.5" opacity="0.8"/>
  <!-- Text -->
  <text x="400" y="310" text-anchor="middle" fill="#EDE0D0" font-family="Georgia,serif" font-size="28" letter-spacing="6" opacity="0.85">VOW</text>
  <text x="400" y="342" text-anchor="middle" fill="#C97B5B" font-family="Geor gia,serif" font-size="13" letter-spacing="3" opacity="0.7">GAME DESIGN</text>
  <!-- Bottom decorative line -->
  <line x1="340" y1="360" x2="460" y2="360" stroke="#BE9D6A" stroke-width="0.8" opacity="0.4"/>
</svg>
